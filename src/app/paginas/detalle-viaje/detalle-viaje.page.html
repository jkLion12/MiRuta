<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/historial"></ion-back-button>
    </ion-buttons>
    <ion-title>Detalle</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [scrollY]="true">
  <main class="pantalla" *ngIf="viaje; else noEncontrado">
    <section class="mapa-contenedor">
      <app-mapa-ruta
        [puntos]="viaje.ruta"
        [centro]="viaje.ruta.length ? viaje.ruta[0] : null"
        [capa]="capa"
        [seguirCentro]="false"
      ></app-mapa-ruta>
    </section>

    <ion-segment [(ngModel)]="capa">
      <ion-segment-button value="calles">
        <ion-label>Calles</ion-label>
      </ion-segment-button>
      <ion-segment-button value="satelite">
        <ion-label>Satélite</ion-label>
      </ion-segment-button>
    </ion-segment>

    <section class="bloque">
      <h1>Editar registro</h1>
      <ion-input label="Origen" label-placement="stacked" [(ngModel)]="viaje.origen"></ion-input>
      <ion-input label="Destino" label-placement="stacked" [(ngModel)]="viaje.destino"></ion-input>
      <ion-input
        label="Distancia km"
        label-placement="stacked"
        type="number"
        inputmode="decimal"
        [(ngModel)]="viaje.distanciaKm"
      ></ion-input>
      <ion-input
        label="Duración segundos"
        label-placement="stacked"
        type="number"
        inputmode="numeric"
        [(ngModel)]="viaje.duracionSegundos"
      ></ion-input>
      <ion-input
        label="Ingreso"
        label-placement="stacked"
        type="number"
        inputmode="decimal"
        [(ngModel)]="viaje.ingreso"
      ></ion-input>
      <ion-input
        label="Costo combustible"
        label-placement="stacked"
        type="number"
        inputmode="decimal"
        [(ngModel)]="viaje.costoCombustible"
      ></ion-input>
      <ion-textarea label="Notas" label-placement="stacked" [(ngModel)]="viaje.notas"></ion-textarea>
      <ion-button expand="block" class="boton-principal" (click)="guardar()">
        <ion-icon name="save-outline" slot="start"></ion-icon>
        Guardar cambios
      </ion-button>
    </section>
  </main>

  <ng-template #noEncontrado>
    <main class="pantalla">
      <section class="bloque">
        <h1>Viaje no encontrado</h1>
        <ion-button expand="block" routerLink="/tabs/historial">Volver</ion-button>
      </section>
    </main>
  </ng-template>
</ion-content>
