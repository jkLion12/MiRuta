<ion-header>
  <ion-toolbar>
    <ion-title>Ajustes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [scrollY]="true">
  <main class="pantalla">
    <section class="bloque">
      <h1>Configuración del vehículo</h1>
      <ion-input
        label="Rendimiento km/L"
        label-placement="stacked"
        type="number"
        inputmode="decimal"
        [(ngModel)]="configuracion.rendimientoKmLitro"
      ></ion-input>
      <ion-input
        label="Precio por litro"
        label-placement="stacked"
        type="number"
        inputmode="decimal"
        [(ngModel)]="configuracion.precioLitro"
      ></ion-input>
      <ion-input label="Moneda" label-placement="stacked" [(ngModel)]="configuracion.moneda"></ion-input>

      <ion-select label="Unidad de distancia" label-placement="stacked" [(ngModel)]="configuracion.unidadDistancia">
        <ion-select-option value="km">Kilómetros</ion-select-option>
        <ion-select-option value="mi">Millas</ion-select-option>
      </ion-select>

      <ion-select label="Tema" label-placement="stacked" [(ngModel)]="configuracion.tema">
        <ion-select-option value="oscuro">Oscuro</ion-select-option>
        <ion-select-option value="claro">Claro</ion-select-option>
        <ion-select-option value="automatico">Automático</ion-select-option>
      </ion-select>

      <ion-button expand="block" class="boton-principal" (click)="guardar()">
        <ion-icon name="save-outline" slot="start"></ion-icon>
        Guardar ajustes
      </ion-button>
    </section>

    <section class="bloque bloque-suave">
      <h2 class="titulo-seccion">Datos locales</h2>
      <p class="subtexto">Los viajes se guardan en el almacenamiento interno de esta app en tu celular.</p>
      <ion-button expand="block" fill="outline" (click)="exportarCsv()">
        <ion-icon name="download-outline" slot="start"></ion-icon>
        Exportar datos a CSV
      </ion-button>
    </section>
  </main>
</ion-content>
